  <style type="text/tailwindcss">
    /* 擦玻璃特效 - 卡片悬停时斜向光泽扫过 */
    .book-card {
        position: relative;
        overflow: hidden;
    }

    .book-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -75%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, 
            rgba(255, 255, 255, 0) 0%, 
            rgba(255, 248, 225, 0.8) 45%,
            rgba(255, 245, 215, 1) 50%,
            rgba(255, 248, 225, 0.7) 55%,
            rgba(255, 255, 255, 0) 100%);
        transform: skewX(-25deg);
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: left 1.2s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.2s;
    }

    .book-card:hover::before {
        left: 125%;
        opacity: 1;
    }
    @layer utilities {
      /* 书影流光效果 */
      .book-shadow {
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .hover-lift {
        transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .hover-lift:hover {
        transform: translateY(-10px) scale(1.01);
        box-shadow: 0 25px 40px rgba(0, 0, 0, 0.18);
      }
      .glass {
        backdrop-filter: blur(14px);
        background: rgba(255, 250, 240, 0.88);
      }
      .text-line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      /* 优雅展开描述动画 */
      .book-desc {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.45s cubic-bezier(0.33, 1, 0.68, 1);
      }
      .book-card:hover .book-desc {
        max-height: 140px;
      }
      /* 五星评分 */
      .star-fill { color: #D4AF37; }
      .star-empty { color: #DCD7CC; }

      /* ========== 动态粒子/墨点特效 ========== */
      .ink-particle {
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        background: rgba(62, 90, 60, 0.3);
        border-radius: 50%;
        filter: blur(2px);
        animation: particleFade 1.2s ease-out forwards;
      }
      @keyframes particleFade {
        0% { transform: scale(0.2) translateY(0); opacity: 0.6; }
        100% { transform: scale(1.8) translateY(-40px); opacity: 0; }
      }
      /* ========== 鼠标拖尾特效 ========== */
    .trail-particle {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      filter: blur(2px);
      will-change: transform, opacity;
      animation: trailFadeOut 0.8s ease-out forwards;
    }

    @keyframes trailFadeOut {
      0% {
        opacity: 0.7;
        transform: scale(0.3);
      }
      50% {
        opacity: 0.5;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(0);
      }
    }
      /* 开屏新视觉 */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        cursor: pointer;
        overflow: hidden;
        background: #1e2c1c;
      }
      .splash-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.75) sepia(0.2);
        transition: transform 6s ease;
      }
      .splash-screen:hover .splash-bg {
        transform: scale(1.05);
      }
      .splash-overlay {
        background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
      }
      .splash-content {
        animation: fadeInUp 1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .splash-screen.fade-out { animation: fadeOut 0.9s forwards; }
      @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

      .main-content { opacity: 0; transition: opacity 0.8s ease; }
      .main-content.visible { opacity: 1; }

      /* 卡片绽放动画 */
      .book-card {
        opacity: 0;
        transform: translateY(30px);
        animation: cardGlide 0.65s ease-out forwards;
      }
      @keyframes cardGlide { to { opacity: 1; transform: translateY(0); } }
      .book-card:nth-child(1) { animation-delay: 0.02s; }
      .book-card:nth-child(2) { animation-delay: 0.06s; }
      .book-card:nth-child(3) { animation-delay: 0.1s; }
      .book-card:nth-child(4) { animation-delay: 0.14s; }
      .book-card:nth-child(5) { animation-delay: 0.18s; }
      .book-card:nth-child(6) { animation-delay: 0.22s; }
      .book-card:nth-child(7) { animation-delay: 0.26s; }
      .book-card:nth-child(8) { animation-delay: 0.3s; }
      .book-card:nth-child(9) { animation-delay: 0.34s; }
      .book-card:nth-child(10) { animation-delay: 0.38s; }
      .book-card:nth-child(11) { animation-delay: 0.42s; }
      .book-card:nth-child(12) { animation-delay: 0.46s; }

      /* 书脊光效（新装饰） */
      .book-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 6px;
        height: 100%;
        background: linear-gradient(135deg, #D4AF37, #B87C2E);
        opacity: 0;
        transition: opacity 0.3s;

      /* 分类涟漪按钮 */

        transition: all 0.3s;
        position: relative;
        overflow: hidden;

      .category-btn:active::before {
        content: '';

        left: 50%;

        height: 300%;

  <script>
      // ==================== 水墨涟漪拖尾特效 ====================
      (function initWaterInkTrail() {
        let trailTimer = null;
        let lastX = 0, lastY = 0;
        let active = false;
        let timeoutId = null;

        function createInkDrop(x, y) {
          const drop = document.createElement('div');
          const size = 12 + Math.random() * 16;
          drop.style.position = 'fixed';
          drop.style.left = (x - size / 2) + 'px';
          drop.style.top = (y - size / 2) + 'px';
          drop.style.width = size + 'px';
          drop.style.height = size + 'px';
          drop.style.borderRadius = '50%';
          drop.style.background = `radial-gradient(circle, rgba(62,90,60,0.5) 0%, rgba(84,70,42,0.2) 70%, transparent 100%)`;
          drop.style.pointerEvents = 'none';
          drop.style.zIndex = '9998';
          drop.style.filter = 'blur(3px)';
          drop.style.opacity = '0.8';
          drop.style.animation = 'inkRipple 0.9s ease-out forwards';
          document.body.appendChild(drop);

          drop.addEventListener('animationend', () => drop.remove());
          setTimeout(() => drop.remove(), 900);
        }

        // 添加涟漪动画
        const style = document.createElement('style');
        style.textContent = `
      @keyframes inkRipple {
        0% { transform: scale(0.2); opacity: 0.6; }
        50% { transform: scale(1.2); opacity: 0.3; }
        100% { transform: scale(2); opacity: 0; }
      }
    `;
        document.head.appendChild(style);

        document.addEventListener('mousemove', (e) => {
          if (!active) active = true;

          const dx = e.clientX - lastX;
          const dy = e.clientY - lastY;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist > 8) {
            createInkDrop(e.clientX, e.clientY);
            if (dist > 20) {
              setTimeout(() => createInkDrop(e.clientX - dx * 0.3, e.clientY - dy * 0.3), 50);
            }
          }

          lastX = e.clientX;
          lastY = e.clientY;

          if (timeoutId) clearTimeout(timeoutId);
          timeoutId = setTimeout(() => { active = false; }, 200);
        });
      })();

    function generateStars(rating) {
      let full = Math.floor(rating);
      let half = rating % 1 !== 0;
      let stars = '';
      for (let i = 0; i < full; i++) stars += '<i class="fa fa-star star-fill text-xs"></i>';
      if (half) stars += '<i class="fa fa-star-half-o star-fill text-xs"></i>';
      for (let i = 0; i < 5 - full - (half ? 1 : 0); i++) stars += '<i class="fa fa-star-o star-empty text-xs"></i>';
      return stars;
    }

          <a href="${book.link}" target="_blank" class="block overflow-hidden">

            <div class="flex justify-center gap-0.5 mb-2">${generateStars(book.rating)}<span class="text-xs text-gray-400 ml-1">(${book.votes})</span></div>

    function initFilters() {
      const btns = document.querySelectorAll('.category-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', function () {
          btns.forEach(b => b.classList.remove('active', 'bg-primary', 'text-white', 'shadow-md', 'border-transparent'));
          btns.forEach(b => b.classList.add('bg-white', 'text-gray-700', 'border', 'border-gray-200'));
          this.classList.add('active', 'bg-primary', 'text-white', 'shadow-md');
          this.classList.remove('bg-white', 'text-gray-700');
          const cate = this.dataset.category;
          const allCards = document.querySelectorAll('.book-card');
          let count = 0;
          allCards.forEach(card => {
            if (cate === 'all' || card.dataset.cate === cate) {
              card.style.display = 'block';
              count++;
            } else card.style.display = 'none';
          });
          document.getElementById('bookCount').innerText = count;
        });
      });
      const allBtn = document.querySelector('.category-btn[data-category="all"]');
      if (allBtn) allBtn.click();
    }

      const cards = document.querySelectorAll('.book-card');
      let visible = 0;
      cards.forEach(card => {
        const title = card.dataset.title?.toLowerCase() || '';
        const author = card.dataset.author?.toLowerCase() || '';

          card.style.display = 'block';

        } else card.style.display = 'none';
      });
      document.getElementById('bookCount').innerText = visible;

    function updateClock() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      const clockEl = document.getElementById('liveClock');
      const dateEl = document.getElementById('gregorianDate');

      if (clockEl) clockEl.innerText = `${hours}:${minutes}:${seconds}`;
      if (dateEl) dateEl.innerText = `${year}年${month}月${day}日`;
    }

    updateClock();

    // ==================== 可拖拽悬浮阅读面板 ====================
    const READING_KEY = 'weary_current_reading';
    const POSITION_KEY = 'weary_float_position';

    // 保存/读取记录
    function saveCurrentReading() {
      const title = document.querySelector('h1')?.innerText || document.title;
      const path = window.location.pathname;
      if (path !== '/' && !path.includes('/index.html')) {
        localStorage.setItem(READING_KEY, JSON.stringify({
          title: title, path: path, timestamp: Date.now(),
          expire: Date.now() + 7 * 24 * 60 * 60 * 1000
        }));
      }
    }

    function getCurrentReading() {
      try {
        const data = localStorage.getItem(READING_KEY);
        if (!data) return null;
        const reading = JSON.parse(data);
        if (reading.expire < Date.now()) { localStorage.removeItem(READING_KEY); return null; }
        return reading;
      } catch (e) { return null; }
    }

    function clearCurrentReading() { localStorage.removeItem(READING_KEY); }

    // 保存位置
    function saveFloatPosition(left, top) {

      try {
        const data = localStorage.getItem(POSITION_KEY);
        if (!data) return null;
        const pos = JSON.parse(data);
        // 位置信息7天过期
        if (pos.timestamp && pos.timestamp + 7 * 24 * 60 * 60 * 1000 < Date.now()) return null;
        return pos;
      } catch (e) { return null; }
    }

    const floatPanel = document.getElementById('readingFloatPanel');
    const floatContent = document.getElementById('readingFloatContent');
    const closeBtn = document.getElementById('closeFloatPanel');
    const clearBtn = document.getElementById('clearReadingRecord');

    // 拖拽相关变量
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let panelStartLeft = 0, panelStartTop = 0;
    let dragTimeout = null;

    // 更新面板内容
    function updateFloatPanel() {
      if (!floatContent) return;
      const reading = getCurrentReading();
      if (!reading || !reading.title) {
        floatContent.innerHTML = `<div class="reading-float-empty"><i class="fa fa-book-open-o"></i><span>暂无阅读记录</span></div>`;
        return;
      }
      const diff = Date.now() - reading.timestamp;
      const hours = Math.floor(diff / 3600000);
      let timeStr = hours < 1 ? '刚刚' : hours < 24 ? `${hours}小时前` : `${Math.floor(hours / 24)}天前`;
      floatContent.innerHTML = `<a href="${reading.path}" class="reading-float-item"><i class="fa fa-book"></i><div class="reading-float-info"><h4>${escapeHtml(reading.title.length > 25 ? reading.title.slice(0, 25) + '…' : reading.title)}</h4><p>上次阅读 · ${timeStr}</p></div><i class="fa fa-chevron-right reading-float-arrow"></i></a>`;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/[&<>]/g, function (m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // 设置面板位置
    function setPanelPosition(left, top) {
      if (!floatPanel) return;
      const maxX = window.innerWidth - floatPanel.offsetWidth - 10;
      const maxY = window.innerHeight - floatPanel.offsetHeight - 10;
      const minX = 10;
      const minY = 70; // 避开顶部导航栏

      let newLeft = Math.min(maxX, Math.max(minX, left));
      let newTop = Math.min(maxY, Math.max(minY, top));

      floatPanel.style.left = newLeft + 'px';
      floatPanel.style.top = newTop + 'px';
      floatPanel.style.right = 'auto';
      floatPanel.style.bottom = 'auto';
    }

    // 初始化面板位置
    function initPanelPosition() {
      if (!floatPanel) return;
      const savedPos = getFloatPosition();
      if (savedPos && savedPos.left !== undefined) {
        setPanelPosition(savedPos.left, savedPos.top);
      } else {
        // 默认右下角
        floatPanel.style.left = 'auto';
        floatPanel.style.right = '20px';
        floatPanel.style.top = 'auto';
        floatPanel.style.bottom = '100px';
      }
    }

    // 拖拽开始
    function onDragStart(e) {
      if (!floatPanel) return;
      e.preventDefault();
      // 确保拖拽的是面板本身，而不是内部链接
      if (e.target.closest('.reading-float-item') || e.target.closest('.reading-float-close') || e.target.closest('.reading-float-clear')) {
        return;
      }

      isDragging = true;
      const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);

      dragStartX = clientX;
      dragStartY = clientY;

      // 获取当前面板位置
      const rect = floatPanel.getBoundingClientRect();
      panelStartLeft = rect.left;
      panelStartTop = rect.top;

      floatPanel.style.transition = 'none';
      floatPanel.style.cursor = 'grabbing';

      if (dragTimeout) clearTimeout(dragTimeout);
    }

    // 拖拽中
    function onDragMove(e) {
      if (!isDragging || !floatPanel) return;
      e.preventDefault();

      const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);

      const deltaX = clientX - dragStartX;
      const deltaY = clientY - dragStartY;

      let newLeft = panelStartLeft + deltaX;
      let newTop = panelStartTop + deltaY;

      // 边界限制
      const maxX = window.innerWidth - floatPanel.offsetWidth - 10;
      const maxY = window.innerHeight - floatPanel.offsetHeight - 10;
      newLeft = Math.min(maxX, Math.max(10, newLeft));
      newTop = Math.min(maxY, Math.max(70, newTop));

      floatPanel.style.left = newLeft + 'px';
      floatPanel.style.top = newTop + 'px';
      floatPanel.style.right = 'auto';
      floatPanel.style.bottom = 'auto';
    }

    // 拖拽结束
    function onDragEnd(e) {
      if (!isDragging || !floatPanel) return;
      isDragging = false;

      floatPanel.style.transition = '';
      floatPanel.style.cursor = '';

      // 保存位置
      const rect = floatPanel.getBoundingClientRect();
      saveFloatPosition(rect.left, rect.top);

      // 延迟恢复点击事件，避免拖拽后误点击
      dragTimeout = setTimeout(() => { }, 100);
    }

    // 绑定拖拽事件
    if (floatPanel) {
      // 鼠标事件
      floatPanel.addEventListener('mousedown', onDragStart);
      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('mouseup', onDragEnd);

      // 触摸事件（移动端）
      floatPanel.addEventListener('touchstart', onDragStart);
      window.addEventListener('touchmove', onDragMove);
      window.addEventListener('touchend', onDragEnd);

      // 防止拖拽时选中文字
      floatPanel.addEventListener('dragstart', (e) => e.preventDefault());

      // 初始化显示
      const reading = getCurrentReading();
      if (reading && reading.title) floatPanel.classList.remove('hidden');
      initPanelPosition();
      updateFloatPanel();

      closeBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        floatPanel.classList.add('hidden');
      });

      clearBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm('确定要清除阅读记录吗？')) {
          clearCurrentReading();
          floatPanel.classList.add('hidden');
          updateFloatPanel();
        }
      });
    }

    // 窗口大小变化时重新调整位置
    window.addEventListener('resize', () => {
      if (floatPanel && !floatPanel.classList.contains('hidden')) {
        const rect = floatPanel.getBoundingClientRect();
        setPanelPosition(rect.left, rect.top);
        const newRect = floatPanel.getBoundingClientRect();
        saveFloatPosition(newRect.left, newRect.top);
      }
    });

    // 文章页面自动保存
    if (window.location.pathname !== '/' && !window.location.pathname.includes('/index.html')) {
      setTimeout(saveCurrentReading, 500);
    }
  </script>
  <!-- 悬浮读报卡片（更精致） -->
  <a href="/人民日报/人民日报.html" id="readingFloatBtn"
    class="fixed bottom-6 right-6 z-50 flex items-center gap-3 bg-white/95 backdrop-blur-md rounded-2xl px-4 py-3 shadow-lg border border-gold/30 transition-all duration-300 hover:shadow-xl hover:scale-105 group"
    style="box-shadow: 0 8px 20px rgba(0,0,0,0.1);">
    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
      <i class="fa fa-newspaper-o text-primary text-lg group-hover:rotate-3 transition-all"></i>
    </div>
    <div class="flex flex-col">
      <span class="text-xs text-secondary">每日阅读</span>
      <span class="text-sm font-semibold text-primary">人民日报</span>
    </div>
    <i class="fa fa-chevron-right text-gold text-sm ml-2 group-hover:translate-x-1 transition-all"></i>
  </a>
</body>
