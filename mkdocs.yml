#[Info]
site_name: Weary-文史哲 #your site name 显示在左上角
site_url: https://juanniaoxx.github.io/
site_description: Content and ambitious, gentle yet firm.
site_author: Weary Bird # your name
#[UI]
theme:
  name: material
  custom_dir: docs/overrides #覆写路径
  logo: /images/favicon.png
  favicon: /images/favicon.png

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: 关闭自动模式
    - media: "(prefers-color-scheme: light)"
      scheme: default # 日间模式
      primary: blue # 上方的
      accent: indigo # 链接等可交互元件的高亮色
      # teal 
      toggle:
        icon: material/toggle-switch # 图标
        name: 切换至夜间模式 # 鼠标悬浮提示
    - media: "(prefers-color-scheme: dark)"
      scheme: slate # 夜间模式
      primary: black 
      accent: indigo
      # teal
      toggle:
        icon: material/toggle-switch-off-outline
        name: 切换至日间模式

  features:
    - announce.dismiss #呈现可标记为由用户读取的临时公告，可以包含一个用于取消当前公告的按钮
    - navigation.tracking #地址栏中的 URL 将自动更新为在目录中突出显示的活动锚点
    - navigation.tabs #顶级部分将呈现在上面视口标题下方的菜单层中，但在移动设备上保持原样
    - navigation.sections #启用部分后，顶级部分在边栏中呈现为1220px以上视口的组，但在移动设备上保持原样
    - navigation.top # 返回顶部的按钮 在上滑时出现
    - navigation.footer #页脚将呈现在边栏中，但在移动设备上保持原样
    - search.suggest # 搜索输入一些字母时推荐补全整个单词
    - search.highlight # 搜索出的文章关键词加入高亮
    - search.share #搜索分享按钮
    - navigation.expand # 打开Tab时左侧目录全部展开
    - navigation.indexes #启用节索引页后，可以将文档直接附加到节
    - content.tabs.link
    - content.tooltips
    - content.code.copy #代码复制
    - content.code.annotate
  language: zh # 一些提示性的文字会变成中文
  icon:
    logo: logo
# [Navigtion]
nav:
  - 🔖 芸签: tag.md
  - 📖 凡例: 备注.md
  - 🌅 启明: 
        - 马恩选集: 马恩选集/0-说明.md
        - 列宁选集: 列宁选集/0-说明.md
        - 毛泽东选集: 毛选/0-毛选.md
  - 📜 铅椠:
        - 史记: 1-史记/0-史记.md
        - 汉书: 2-汉书/0-汉书.md 
        - 后汉书: 3-后汉书/0-后汉书.md
        - 三国志: 4-三国志/0-三国志.md
        - 晋书: 5-晋书/0-晋书.md
        - 宋书: 6-宋书/0-宋书.md
  - 🎋 兰台:
        - 昭明文选: 昭明文选/0-昭明文选.md
        - 古文观止: 古文观止/0-古文观止.md
        - 宋词: 宋词/宋词.md 
  - 🍵 清谈:
        - 国史大纲: 国史大纲/0-国史大纲.md
        - 中国历代政治得失: 中国历代政治得失/0-中国历代政治得失.md
        - 夜航船: 夜航船/0-夜航船.md
        - 聊斋志异: 聊斋志异/0-聊斋志异.md

extra:
  generator: false #是否在页脚显示“使用 MkDocs 材料制造”

plugins:
  - search #搜索配置
  - tags

markdown_extensions:
#详见https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown-extensions/ 和 https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/
  # 缩写词 语法为 *[HTML]: HyperText Markup Language 
  - abbr 
  # 运行为MarkDown元素添加HTML属性
  - attr_list
  # 支持警告/提示框 
  - admonition
  # 支持定义列表(类似<dl>)
  - def_list
  # 支持脚注 
  # 语法为 
  # 这是一个脚注[1](@ref) 
  # [1](@ref): 脚注内容
  - footnotes
  # 运行在HTML内嵌套markdown语法
  # <div markdown="1"> </div>
  - md_in_html
  # - meta # 支持Markdown文件上方自定义标题标签等
  - pymdownx.caret # 支持插入符(^)格式
  - pymdownx.betterem # 增强强调语法
  - pymdownx.critic #支持批判性标记 (增删改注释)
  - pymdownx.details  # 支持可折叠区域 
  - pymdownx.inlinehilite # 支持行内代码高亮
  - pymdownx.keys ## 支持渲染键盘按键
  - pymdownx.mark ## 支持标记文本 ==高亮== -> 高亮
  - pymdownx.snippets # 支持代码片段复用
  - pymdownx.smartsymbols # 将符号转换为特殊字符
  - pymdownx.tilde # 支持删除线

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format:
            !!python/name:pymdownx.superfences.fence_code_format # 代码块高亮插件

  - pymdownx.arithmatex: # latex支持
      generic: true
      smart_dollar: false
  # - toc:
  #     permalink: true # 固定标题位置为当前位置
  - pymdownx.highlight: # 代码块高亮
      anchor_linenums: true
      linenums: true # 显示行号
      auto_title: true # 显示编程语言名称
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
extra_javascript:
  - javascripts/extra.js
  - javascripts/latex.js #自定义javascript
  - javascripts/mathjax.js #Latex支持
  - javascripts/favicons.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js #Latex支持
  - https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js # PDF阅读
  - javascripts/reading-base.js
  - javascripts/reading-data-index.js
  - javascripts/reading-init.js 
  - javascripts/anchor-highlight.js
  - javascripts/scroll-progress.js
  - javascripts/pdf-viewer.js
  - javascripts/ancient-book.js 
  - javascripts/cipai-nav.js
  - javascripts/cipai-search.js
  - javascripts/cipai-init.js

extra_css:
  - stylesheets/extra.css # 自定义CSS
  # - stylesheets/link.css #友链配置
  # - stylesheets/customize.css # 搜索圆角优化
  # - https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css # font-awesome表情支持
  # - https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css #字体
  # - stylesheets/scroll-progress.css
  # - stylesheets/pdf-viewer.css

validation:
  nav:
    omitted_files: ignore
