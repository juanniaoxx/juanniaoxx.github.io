<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · 书卷散佚 · Weary Bird</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3E5A3C',
            secondary: '#8A9BA8',
            neutral: '#F9F7F3',
            dark: '#2C2A29',
            gold: '#D4AF37'
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style>
    body {
      background-color: #F9F7F3;
      background-image: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 40%);
      min-height: 100vh;
    }
    .paper-texture {
      position: relative;
    }
    .paper-texture::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(transparent, transparent 29px, rgba(212, 175, 55, 0.05) 30px);
    }
    .ink-smudge {
      position: absolute;
      bottom: 10%;
      left: 5%;
      width: 150px;
      height: 150px;
      background: rgba(62, 90, 60, 0.08);
      border-radius: 50%;
      filter: blur(40px);
      pointer-events: none;
      z-index: 0;
    }
    .ink-smudge-right {
      position: absolute;
      top: 20%;
      right: 5%;
      width: 200px;
      height: 200px;
      background: rgba(212, 175, 55, 0.06);
      border-radius: 60% 40% 50% 50%;
      filter: blur(50px);
      pointer-events: none;
      z-index: 0;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float-animation {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: pageFadeIn 0.6s ease-out forwards;
    }
  </style>
</head>
<body class="font-sans antialiased relative overflow-hidden">

  <!-- 墨韵装饰 -->
  <div class="ink-smudge"></div>
  <div class="ink-smudge-right"></div>

  <div class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-16 fade-in">
    
    <!-- 书卷图标 -->
    <div class="mb-8 float-animation">
      <div class="relative">
        <i class="fa fa-book text-7xl text-gold/40"></i>
        <i class="fa fa-search-minus text-3xl text-primary absolute -bottom-2 -right-4"></i>
      </div>
    </div>

    <!-- 404 数字 -->
    <h1 class="text-8xl md:text-9xl font-serif font-bold text-primary mb-4 tracking-wider">
      4<span class="text-gold">0</span>4
    </h1>

    <!-- 副标题 -->
    <p class="text-secondary text-lg md:text-xl mb-2 font-light tracking-wide">
      书卷散佚 · 墨香犹存
    </p>

    <!-- 分割线 -->
    <div class="w-16 h-px bg-gold/40 my-6"></div>

    <!-- 提示信息 -->
    <div class="max-w-md text-center mb-8">
      <p class="text-dark/70 leading-relaxed">
        您所寻的篇章，<br class="md:hidden">
        或已湮没于岁月长河，或藏于别处幽阁。
      </p>
    </div>

    <!-- 返回按钮 -->
    <div class="flex flex-col sm:flex-row gap-4 mt-4">
      <a href="/" 
         class="px-8 py-3 bg-primary text-white rounded-full hover:bg-primary/80 transition-all duration-300 flex items-center justify-center gap-2 shadow-md hover:shadow-lg group">
        <i class="fa fa-home group-hover:-translate-x-1 transition-transform"></i>
        返回书库
      </a>
      <a href="javascript:history.back()" 
         class="px-8 py-3 bg-white/60 backdrop-blur-sm text-primary border border-gold/30 rounded-full hover:bg-white/80 transition-all duration-300 flex items-center justify-center gap-2">
        <i class="fa fa-arrow-left"></i>
        返回上页
      </a>
    </div>

    <!-- 随机金句 -->
    <div class="mt-12 text-center">
      <div class="quote-ticker inline-flex items-center gap-3 bg-gold/5 backdrop-blur-sm px-5 py-2 rounded-full border border-gold/20">
        <i class="fa fa-leaf text-gold text-sm"></i>
        <span class="text-secondary text-sm" id="randomQuote">博观而约取，厚积而薄发</span>
        <i class="fa fa-feather text-gold text-sm"></i>
      </div>
    </div>

    <!-- 页脚 -->
    <footer class="absolute bottom-6 left-0 right-0 text-center text-gray-400 text-xs">
      <p>Weary Bird · 文史哲</p>
    </footer>
  </div>

  <script>
    // 随机金句库
    const quotes = [
      "博观而约取，厚积而薄发",
      "为天地立心，为生民立命",
      "究天人之际，通古今之变",
      "学而时习之，不亦说乎",
      "书中自有黄金屋",
      "旧书不厌百回读",
      "腹有诗书气自华",
      "读书破万卷，下笔如有神"
    ];
    
    const quoteSpan = document.getElementById('randomQuote');
    if (quoteSpan) {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      quoteSpan.innerText = quotes[randomIndex];
    }
  </script>
</body>
</html>
