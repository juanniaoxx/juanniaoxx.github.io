  <style type="text/tailwindcss">
    @layer utilities {
      /* 书影流光效果 */

        transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);

        backdrop-filter: blur(14px);

      @keyframes particleFade {
        0% { transform: scale(0.2) translateY(0); opacity: 0.6; }
        100% { transform: scale(1.8) translateY(-40px); opacity: 0; }

      /* ========== 鼠标拖尾特效 ========== */

      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      filter: blur(2px);
      will-change: transform, opacity;
      animation: trailFadeOut 0.8s ease-out forwards;

    @keyframes trailFadeOut {
      0% {
        opacity: 0.7;

  // ==================== 水墨涟漪拖尾特效 ====================
  (function initWaterInkTrail() {
    let trailTimer = null;
    let lastX = 0, lastY = 0;
    let active = false;
    let timeoutId = null;

    function createInkDrop(x, y) {
      const drop = document.createElement('div');
      const size = 12 + Math.random() * 16;
      drop.style.position = 'fixed';
      drop.style.left = (x - size / 2) + 'px';
      drop.style.top = (y - size / 2) + 'px';
      drop.style.width = size + 'px';
      drop.style.height = size + 'px';
      drop.style.borderRadius = '50%';
      drop.style.background = `radial-gradient(circle, rgba(62,90,60,0.5) 0%, rgba(84,70,42,0.2) 70%, transparent 100%)`;
      drop.style.pointerEvents = 'none';
      drop.style.zIndex = '9998';
      drop.style.filter = 'blur(3px)';
      drop.style.opacity = '0.8';
      drop.style.animation = 'inkRipple 0.9s ease-out forwards';
      document.body.appendChild(drop);
      
      drop.addEventListener('animationend', () => drop.remove());
      setTimeout(() => drop.remove(), 900);
    }

    // 添加涟漪动画
    const style = document.createElement('style');
    style.textContent = `
      @keyframes inkRipple {
        0% { transform: scale(0.2); opacity: 0.6; }
        50% { transform: scale(1.2); opacity: 0.3; }
        100% { transform: scale(2); opacity: 0; }
      }
    `;
    document.head.appendChild(style);

    document.addEventListener('mousemove', (e) => {
      if (!active) active = true;
      
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist > 8) {
        createInkDrop(e.clientX, e.clientY);
        if (dist > 20) {
          setTimeout(() => createInkDrop(e.clientX - dx*0.3, e.clientY - dy*0.3), 50);
        }
      }
      
      lastX = e.clientX;
      lastY = e.clientY;
      
      if (timeoutId) clearTimeout(timeoutId);
      timeoutId = setTimeout(() => { active = false; }, 200);
    });
  })();

    ];

    // 经典金句库（丰富随机展示）
    const quotes = [
      "博观而约取，厚积而薄发", "为天地立心，为生民立命", "究天人之际，通古今之变", "学而时习之，不亦说乎",
      "仁义礼智根于心", "民为贵，社稷次之", "纸上得来终觉浅，绝知此事要躬行", "路漫漫其修远兮，吾将上下而求索",
      "以史为镜，可以知兴替", "独立之精神，自由之思想", "为往圣继绝学", "文史哲，通人之学也"
    ];
    let currentQuoteIdx = 0;

    function updateRandomQuote() {
      const quoteSpan = document.getElementById('dynamicQuote');
      let newQuote = quotes[Math.floor(Math.random() * quotes.length)];
      quoteSpan.style.opacity = '0';
      setTimeout(() => {
        quoteSpan.innerText = newQuote;
        quoteSpan.style.opacity = '1';
      }, 150);
      quoteSpan.style.transition = 'opacity 0.3s';
    }

    function generateStars(rating) {
      let full = Math.floor(rating);
      let half = rating % 1 !== 0;
      let stars = '';
      for (let i = 0; i < full; i++) stars += '<i class="fa fa-star star-fill text-xs"></i>';
      if (half) stars += '<i class="fa fa-star-half-o star-fill text-xs"></i>';
      for (let i = 0; i < 5 - full - (half ? 1 : 0); i++) stars += '<i class="fa fa-star-o star-empty text-xs"></i>';
      return stars;
    }

    function renderBooks(books) {
      const container = document.getElementById('bookContainer');
      container.innerHTML = books.map(book => `
        <div class="book-card relative rounded-2xl overflow-hidden book-shadow bg-white group" data-cate="${book.cate}" data-title="${book.title}" data-author="${book.author}">
          <a href="${book.link}" target="_blank" class="block overflow-hidden">
            <img src="${book.img}" alt="${book.title}" onerror="this.src='https://picsum.photos/200/280?random=${Math.random()}'" class="w-full h-auto object-cover transition-transform duration-700 group-hover:scale-105">
          </a>
          <div class="p-4 text-center">
            <h3 class="font-semibold font-serif text-lg mb-1">${book.title}</h3>
            <p class="text-xs text-secondary mb-2">${book.desc}</p>
            <div class="flex justify-center gap-0.5 mb-2">${generateStars(book.rating)}<span class="text-xs text-gray-400 ml-1">(${book.votes})</span></div>
            <div class="book-desc text-xs text-gray-600 leading-relaxed px-1">${book.intro}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('bookCount').innerText = books.length;
    }

    function updateCategoryCount() {
      const unique = new Set(booksData.map(b => b.cate));
      document.getElementById('categoryCount').innerText = unique.size;
    }

    // 墨滴粒子特效
    function createInkParticle(x, y) {
      const particle = document.createElement('div');
      particle.className = 'ink-particle';
      const size = 10 + Math.random() * 20;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 1200);
    }

    function burstParticles(e) {
      for (let i = 0; i < 16; i++) {
        const offsetX = (Math.random() - 0.5) * 80;
        const offsetY = (Math.random() - 0.5) * 80;
        createInkParticle(e.clientX + offsetX, e.clientY + offsetY);
      }
    }

    // 开屏 & 交互
    const splash = document.getElementById('splashScreen');
    const main = document.getElementById('mainContent');
    const splashBg = document.getElementById('splashBg');
    const bgPool = ['/images/开屏.png', '/images/开屏1.png', '/images/开屏2.png', '/images/开屏3.png', '/images/开屏4.png'];
    splashBg.src = bgPool[Math.floor(Math.random() * bgPool.length)];

    function enterMain() {
      splash.classList.add('fade-out');
      main.classList.add('visible');
      setTimeout(() => { splash.style.display = 'none'; }, 900);
    }
    splash.addEventListener('click', enterMain);
    window.addEventListener('load', () => { setTimeout(() => { if (splash.style.display !== 'none') enterMain(); }, 2800); });

    renderBooks(booksData);
    updateCategoryCount();

    // 分类 & 搜索
    function initFilters() {
      const btns = document.querySelectorAll('.category-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', function () {
          btns.forEach(b => b.classList.remove('active', 'bg-primary', 'text-white', 'shadow-md', 'border-transparent'));
          btns.forEach(b => b.classList.add('bg-white', 'text-gray-700', 'border', 'border-gray-200'));
          this.classList.add('active', 'bg-primary', 'text-white', 'shadow-md');
          this.classList.remove('bg-white', 'text-gray-700');
          const cate = this.dataset.category;
          const allCards = document.querySelectorAll('.book-card');
          let count = 0;
          allCards.forEach(card => {
            if (cate === 'all' || card.dataset.cate === cate) {
              card.style.display = 'block';
              count++;
            } else card.style.display = 'none';
          });
          document.getElementById('bookCount').innerText = count;
        });
      });
      const allBtn = document.querySelector('.category-btn[data-category="all"]');
      if (allBtn) allBtn.click();
    }

    const search = document.getElementById('searchInput');
    search?.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('.book-card');
      let visible = 0;
      cards.forEach(card => {
        const title = card.dataset.title?.toLowerCase() || '';
        const author = card.dataset.author?.toLowerCase() || '';
        if (title.includes(term) || author.includes(term) || term === '') {
          card.style.display = 'block';
          visible++;
        } else card.style.display = 'none';
      });
      document.getElementById('bookCount').innerText = visible;
    });

    setTimeout(() => { initFilters(); }, 200);

    // 滚动动画 & 回到顶部
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.section-fade').forEach(el => observer.observe(el));

    const header = document.getElementById('mainHeader');
    window.addEventListener('scroll', () => { header.classList.toggle('header-scroll', window.scrollY > 50); });
    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => { backBtn.classList.toggle('hidden', window.scrollY < 400); backBtn.style.display = window.scrollY >= 400 ? 'flex' : 'none'; });
    backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // 随机金句切换
    document.getElementById('randomQuoteBtn').addEventListener('click', updateRandomQuote);
    setInterval(updateRandomQuote, 18000);

    // 墨韵特效按钮
    const inkBtn = document.getElementById('inkEffectBtn');
    inkBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      for (let i = 0; i < 30; i++) {
        const randX = e.clientX + (Math.random() - 0.5) * 100;
        const randY = e.clientY + (Math.random() - 0.5) * 80;
        createInkParticle(randX, randY);
      }
    });
    document.body.addEventListener('click', (e) => {
      if (e.target.closest('.floating-ink')) return;
      if (Math.random() < 0.25) createInkParticle(e.clientX, e.clientY);
    });
  </script>
